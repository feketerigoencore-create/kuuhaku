<svg viewBox="0 0 1040 780" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6b6b6b"/>
    </marker>
    <style>
      .title{font-size:22px;font-weight:700;fill:#1a1a1a}
      .sub{font-size:12px;fill:#5a5a5a}
      .boxttl{font-size:15px;font-weight:700}
      .boxtxt{font-size:11.5px}
      .tag{font-size:10.5px;font-weight:700}
      .lbl{font-size:11px;fill:#444;font-weight:600}
    </style>
  </defs>

  <rect x="0" y="0" width="1040" height="780" fill="#faf9f7"/>
  <text x="40" y="44" class="title">C案 最新版オペレーション構成図</text>
  <text x="40" y="64" class="sub">資産型・片手間運用 ／ 確認日 2026-06-27 ／ 凡例: ■自動  ■半自動  ■手動(人間必須)</text>

  <!-- legend dots -->
  <rect x="640" y="52" width="14" height="14" rx="3" fill="#2e7d5b"/><text x="660" y="64" class="sub">自動</text>
  <rect x="715" y="52" width="14" height="14" rx="3" fill="#c98a1b"/><text x="735" y="64" class="sub">半自動</text>
  <rect x="800" y="52" width="14" height="14" rx="3" fill="#b23b3b"/><text x="820" y="64" class="sub">手動(人間)</text>

  <!-- HUMAN -->
  <rect x="370" y="92" width="300" height="74" rx="12" fill="#fceeee" stroke="#b23b3b" stroke-width="2"/>
  <rect x="384" y="104" width="58" height="18" rx="4" fill="#b23b3b"/><text x="392" y="117" class="tag" fill="#fff">人間</text>
  <text x="386" y="142" class="boxtxt" fill="#7a2424">① 公開ゲート(記事ごと・5〜10分)</text>
  <text x="386" y="159" class="boxtxt" fill="#7a2424">② 週次レビュー(週1・15分)</text>

  <!-- COWORK hub -->
  <rect x="300" y="210" width="440" height="250" rx="14" fill="#eef3fb" stroke="#3a5e9e" stroke-width="2.5"/>
  <text x="320" y="238" class="boxttl" fill="#26406e">Cowork(母艦 / Desktop)</text>
  <text x="320" y="257" class="boxtxt" fill="#3a5278">プロジェクト+メモリ(トンマナ/NG規程/テンプレ常駐) ・ スケジュール実行</text>

  <!-- sub-agents inside cowork -->
  <rect x="318" y="272" width="190" height="76" rx="9" fill="#fff" stroke="#2e7d5b" stroke-width="1.8"/>
  <rect x="330" y="282" width="40" height="16" rx="4" fill="#2e7d5b"/><text x="336" y="294" class="tag" fill="#fff">自動</text>
  <text x="330" y="318" class="boxtxt" font-weight="700">①定点調査 サブエージェント</text>
  <text x="330" y="335" class="boxtxt">競合/KW週次巡回→差分md+xlsx</text>

  <rect x="532" y="272" width="190" height="76" rx="9" fill="#fff" stroke="#c98a1b" stroke-width="1.8"/>
  <rect x="544" y="282" width="56" height="16" rx="4" fill="#c98a1b"/><text x="550" y="294" class="tag" fill="#fff">半自動</text>
  <text x="544" y="318" class="boxtxt" font-weight="700">②記事設計 サブエージェント</text>
  <text x="544" y="335" class="boxtxt">構成/比較表/FAQ/SEO骨子を生成</text>

  <rect x="318" y="362" width="190" height="76" rx="9" fill="#fff" stroke="#c98a1b" stroke-width="1.8"/>
  <rect x="330" y="372" width="56" height="16" rx="4" fill="#c98a1b"/><text x="336" y="384" class="tag" fill="#fff">半自動</text>
  <text x="330" y="408" class="boxtxt" font-weight="700">③コンプラ点検 サブエージェント</text>
  <text x="330" y="425" class="boxtxt">薬機/景表/PR表記を走査→フラグ</text>

  <rect x="532" y="362" width="190" height="76" rx="9" fill="#fff" stroke="#2e7d5b" stroke-width="1.8"/>
  <rect x="544" y="372" width="40" height="16" rx="4" fill="#2e7d5b"/><text x="550" y="384" class="tag" fill="#fff">自動</text>
  <text x="544" y="408" class="boxtxt" font-weight="700">⑥集計 サブエージェント</text>
  <text x="544" y="425" class="boxtxt">KPI集計→xlsx+アーティファクト</text>

  <!-- Claude Code -->
  <rect x="772" y="250" width="228" height="120" rx="12" fill="#edf6f1" stroke="#2e7d5b" stroke-width="2"/>
  <text x="790" y="277" class="boxttl" fill="#1f5e44">Claude Code</text>
  <rect x="790" y="286" width="78" height="16" rx="4" fill="#2e7d5b"/><text x="796" y="298" class="tag" fill="#fff">自動寄り半自動</text>
  <text x="790" y="320" class="boxtxt" fill="#1f5e44">⑤サイト実装・更新</text>
  <text x="790" y="337" class="boxtxt" fill="#1f5e44">subagent+worktree / checkpoints</text>
  <text x="790" y="354" class="boxtxt" fill="#1f5e44">Stopフックでビルド自己チェック</text>

  <!-- Claude in Chrome -->
  <rect x="40" y="250" width="228" height="120" rx="12" fill="#fbf2e6" stroke="#c98a1b" stroke-width="2"/>
  <text x="58" y="277" class="boxttl" fill="#8a5e12">Claude in Chrome</text>
  <rect x="58" y="286" width="56" height="16" rx="4" fill="#c98a1b"/><text x="64" y="298" class="tag" fill="#fff">半自動</text>
  <text x="58" y="320" class="boxtxt" fill="#8a5e12">④SNS投稿/予約(規約確認は人)</text>
  <text x="58" y="337" class="boxtxt" fill="#8a5e12">順位取得・競合ページ取得</text>
  <text x="58" y="354" class="boxtxt" fill="#8a5e12">ASP/GA管理画面DL</text>

  <!-- Cloud schedule -->
  <rect x="300" y="610" width="440" height="86" rx="12" fill="#eef3fb" stroke="#3a5e9e" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="320" y="638" class="boxttl" fill="#26406e">Claude Code /schedule(クラウド常駐)</text>
  <rect x="320" y="648" width="40" height="16" rx="4" fill="#2e7d5b"/><text x="326" y="660" class="tag" fill="#fff">自動</text>
  <text x="370" y="661" class="boxtxt" fill="#3a5278">PCを閉じても回したい監視・通知をここへ逃がす</text>
  <text x="320" y="683" class="boxtxt" fill="#3a5278">※CoworkスケジュールはPC起動+Desktop起動中のみ稼働 → 常時監視はこちら</text>

  <!-- Outputs -->
  <rect x="40" y="520" width="228" height="120" rx="12" fill="#f3f0fb" stroke="#6a4ea0" stroke-width="2"/>
  <text x="58" y="547" class="boxttl" fill="#4a3576">成果物</text>
  <text x="58" y="573" class="boxtxt" fill="#4a3576">・差分リサーチ md / tracker.xlsx</text>
  <text x="58" y="592" class="boxtxt" fill="#4a3576">・記事ドラフト md(比較表/FAQ)</text>
  <text x="58" y="611" class="boxtxt" fill="#4a3576">・KPIダッシュボード(アーティファクト)</text>
  <text x="58" y="630" class="boxtxt" fill="#4a3576">・公開サイト(実装反映)</text>

  <!-- arrows: human <-> cowork -->
  <line x1="520" y1="166" x2="520" y2="208" stroke="#6b6b6b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="500" y1="208" x2="500" y2="166" stroke="#6b6b6b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="540" y="192" class="lbl">承認 / レビュー</text>

  <!-- cowork <-> chrome -->
  <line x1="298" y1="310" x2="270" y2="310" stroke="#6b6b6b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="270" y1="330" x2="298" y2="330" stroke="#6b6b6b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="120" y="404" class="lbl">投稿 / データ取得</text>

  <!-- cowork <-> code -->
  <line x1="742" y1="310" x2="770" y2="310" stroke="#6b6b6b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="744" y="300" class="lbl">実装依頼</text>

  <!-- code <-> chrome verify (long arc via labels) -->
  <line x1="772" y1="356" x2="270" y2="356" stroke="#9a9a9a" stroke-width="1.3" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <text x="470" y="350" class="lbl" fill="#777">build→test/verify(Chrome拡張)</text>

  <!-- cowork -> cloud schedule -->
  <line x1="520" y1="460" x2="520" y2="608" stroke="#6b6b6b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="528" y="540" class="lbl">常時監視を委譲</text>

  <!-- cowork -> outputs -->
  <line x1="318" y1="452" x2="180" y2="518" stroke="#6b6b6b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="190" y="495" class="lbl">生成・出力</text>

  <!-- code -> outputs (site) -->
  <line x1="800" y1="372" x2="260" y2="560" stroke="#9a9a9a" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

  <text x="40" y="740" class="sub">人間の介入は「公開ゲート」と「週次レビュー」の2点に最小化。巡回・素材生成・集計・整形・投稿予約は自動/半自動、品質はフック+サブエージェント相互レビューで担保。</text>
  <text x="40" y="762" class="sub">注: アダルト露骨表現の本文化・最終法的判断・各SNS規約適合は人間側(手動)。Claudeは構成・素材・点検・実装・集計を担当(Usage Policy上の制約に整合)。</text>
</svg>
